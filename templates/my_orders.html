<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#F97316"/>
  <title>My Orders — NOVA EATERY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/customer.css') }}"/>
  <link rel="shortcut icon" href="/static/icons/logo.png" type="image/x-icon">
</head>
<body>

<header class="top-bar">
  <div class="top-bar-left">
    <a href="{{ url_for('menu') }}" class="btn-back">&#8592;</a>
  </div>
  <span class="top-bar-title">My Orders</span>
  <div class="top-bar-right"></div>
</header>

<main class="page-content">
  <div class="panel-lookup">
    <input type="tel" id="orderPhoneInput" class="form-control" placeholder="e.g. 07XXXXXXXX" maxlength="15"/>
    <button class="btn btn-primary btn-sm" id="lookupOrdersBtn">Find</button>
  </div>
  <div id="ordersContainer">
    <p style="color:var(--text-muted);font-size:0.88rem;text-align:center;padding:24px 0;">
      Enter your phone number above to see your order history.
    </p>
  </div>
</main>

<footer class="site-footer">© 2026 TECH NOVA. All rights reserved.</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const phoneInput = document.getElementById('orderPhoneInput');
  const lookupBtn  = document.getElementById('lookupOrdersBtn');
  const container  = document.getElementById('ordersContainer');

  async function lookup() {
    const phone = phoneInput.value.trim();
    if (!phone) { container.innerHTML = '<p style="color:var(--text-muted);text-align:center">Please enter your phone number.</p>'; return; }
    container.innerHTML = '<p style="text-align:center;color:var(--text-muted)">Loading...</p>';
    try {
      const res = await fetch(`/api/my-orders?phone=${encodeURIComponent(phone)}`);
      const orders = await res.json();
      if (!orders.length) {
        container.innerHTML = '<div class="empty-state"><p>No orders found for this number.</p></div>';
        return;
      }
      container.innerHTML = orders.map(o => `
        <div class="order-history-card">
          <div class="order-history-header">
            <span class="order-history-id">Order #${o.id}</span>
            ${statusBadge(o.status)}
          </div>
          <div class="order-history-details">
            <span>🪑 Table: ${o.table_number}</span>
            <span>💰 Total: KES ${o.total_amount}</span>
            <span>🕐 ${timeAgo(o.created_at)}</span>
          </div>
        </div>`).join('');
    } catch(e) {
      container.innerHTML = '<p style="color:red;text-align:center">Error loading orders.</p>';
    }
  }

  lookupBtn.addEventListener('click', lookup);
  phoneInput.addEventListener('keydown', e => { if (e.key === 'Enter') lookup(); });
});
</script>
</body>
</html>
